server {
    listen 80;
    server_name 81.26.187.199;  # Ваш IP или домен

    # Логи для отладки
    access_log /var/log/nginx/frontend_access.log;
    error_log /var/log/nginx/frontend_error.log;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # Кэширование статики
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        # ✅ Исправлено: убран /api/ из proxy_pass
        proxy_pass http://127.0.0.1:8000/;
        
        # Заголовки для прокси
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Важно для Django
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Отключаем редиректы
        proxy_redirect off;
        proxy_buffering off;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Для загрузки больших файлов
        client_max_body_size 10M;
    }
    
    # Опционально: статика Django (если не отдается через Django)
    location /static/ {
        alias /path/to/your/django/static/;
    }
    
    location /media/ {
        alias /path/to/your/django/media/;
    }
}